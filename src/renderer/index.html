<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'">
  <title>CursorLike IDE</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    :root {
      --bg-primary: #1e1e1e;
      --bg-secondary: #252526;
      --bg-tertiary: #2d2d2d;
      --text-primary: #cccccc;
      --text-secondary: #858585;
      --accent: #007acc;
      --accent-hover: #0062a3;
      --border: #3c3c3c;
      --success: #4ec9b0;
      --error: #f14c4c;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: var(--bg-primary);
      color: var(--text-primary);
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    
    /* Title Bar */
    .titlebar {
      height: 30px;
      background: var(--bg-tertiary);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      -webkit-app-region: drag;
    }
    
    .titlebar-title {
      font-size: 12px;
      color: var(--text-secondary);
    }
    
    .titlebar-controls {
      display: flex;
      gap: 5px;
      -webkit-app-region: no-drag;
    }
    
    .titlebar-btn {
      width: 30px;
      height: 20px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 3px;
    }
    
    .titlebar-btn:hover {
      background: rgba(255,255,255,0.1);
    }
    
    .titlebar-btn.close:hover {
      background: #e81123;
      color: white;
    }
    
    /* Main Layout */
    .main-container {
      display: flex;
      flex: 1;
      overflow: hidden;
    }
    
    /* Sidebar */
    .sidebar {
      width: 50px;
      background: var(--bg-secondary);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding-top: 10px;
      border-right: 1px solid var(--border);
    }
    
    .sidebar-icon {
      width: 40px;
      height: 40px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: 5px;
      margin-bottom: 5px;
    }
    
    .sidebar-icon:hover {
      background: rgba(255,255,255,0.1);
      color: var(--text-primary);
    }
    
    .sidebar-icon.active {
      color: var(--accent);
      border-left: 2px solid var(--accent);
    }
    
    /* Editor Area */
    .editor-area {
      flex: 1;
      display: flex;
      flex-direction: column;
    }
    
    .editor-tabs {
      height: 35px;
      background: var(--bg-secondary);
      display: flex;
      align-items: center;
      border-bottom: 1px solid var(--border);
    }
    
    .editor-tab {
      padding: 8px 15px;
      font-size: 13px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border-right: 1px solid var(--border);
      cursor: pointer;
    }
    
    .editor-tab.active {
      background: var(--bg-primary);
      border-bottom: 2px solid var(--accent);
    }
    
    .editor-content {
      flex: 1;
      padding: 10px;
      font-family: 'Fira Code', 'Consolas', monospace;
      font-size: 14px;
      line-height: 1.5;
      background: var(--bg-primary);
      color: var(--text-primary);
      border: none;
      resize: none;
      outline: none;
    }
    
    /* AI Panel */
    .ai-panel {
      width: 400px;
      background: var(--bg-secondary);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
    }
    
    .ai-header {
      padding: 15px;
      border-bottom: 1px solid var(--border);
    }
    
    .ai-title {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 10px;
    }
    
    .ai-input-container {
      padding: 10px;
      border-top: 1px solid var(--border);
    }
    
    .ai-input {
      width: 100%;
      padding: 10px;
      background: var(--bg-tertiary);
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--text-primary);
      font-size: 13px;
      outline: none;
    }
    
    .ai-input:focus {
      border-color: var(--accent);
    }
    
    .ai-submit-btn {
      width: 100%;
      padding: 10px;
      margin-top: 10px;
      background: var(--accent);
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
      font-weight: 600;
    }
    
    .ai-submit-btn:hover {
      background: var(--accent-hover);
    }
    
    /* Status Bar */
    .statusbar {
      height: 22px;
      background: var(--accent);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 10px;
      font-size: 12px;
      color: white;
    }
    
    .statusbar-right {
      display: flex;
      gap: 15px;
    }
  </style>
</head>
<body>
  <!-- Title Bar -->
  <div class="titlebar">
    <span class="titlebar-title">CursorLike IDE</span>
    <div class="titlebar-controls">
      <button class="titlebar-btn" onclick="window.electronAPI?.minimize()">_</button>
      <button class="titlebar-btn" onclick="window.electronAPI?.maximize()">□</button>
      <button class="titlebar-btn close" onclick="window.electronAPI?.close()">×</button>
    </div>
  </div>
  
  <!-- Main Container -->
  <div class="main-container">
    <!-- Sidebar -->
    <div class="sidebar">
      <div class="sidebar-icon active" title="Explorer">📁</div>
      <div class="sidebar-icon" title="Search">🔍</div>
      <div class="sidebar-icon" title="Git">📊</div>
      <div class="sidebar-icon" title="AI Assistant">🤖</div>
      <div class="sidebar-icon" title="Extensions">⚙️</div>
    </div>
    
    <!-- Editor Area -->
    <div class="editor-area">
      <div class="editor-tabs">
        <div class="editor-tab active">main.ts</div>
        <div class="editor-tab">utils.ts</div>
      </div>
      <textarea class="editor-content" id="editor" spellcheck="false">
// Welcome to CursorLike IDE!
// Start coding here...

function hello() {
  console.log("Hello from CursorLike IDE!");
}

hello();
</textarea>
    </div>
    
    <!-- AI Panel -->
    <div class="ai-panel">
      <div class="ai-header">
        <div class="ai-title">🤖 AI Assistant</div>
        <div style="font-size: 12px; color: var(--text-secondary);">
          Press Ctrl+K to open command palette
        </div>
      </div>
      <div id="ai-messages" style="flex: 1; overflow-y: auto; padding: 10px;">
        <div style="margin-bottom: 10px; font-size: 13px;">
          <strong>AI:</strong> Hello! I'm your AI assistant. How can I help you code today?
        </div>
      </div>
      <div class="ai-input-container">
        <textarea class="ai-input" id="aiInput" placeholder="Ask AI to help with your code..." rows="3"></textarea>
        <button class="ai-submit-btn" onclick="sendAIRequest()">Send (Ctrl+Enter)</button>
      </div>
    </div>
  </div>
  
  <!-- Status Bar -->
  <div class="statusbar">
    <div>Ready</div>
    <div class="statusbar-right">
      <span>TypeScript</span>
      <span>UTF-8</span>
      <span>Ln 1, Col 1</span>
    </div>
  </div>
  
  <script type="module">
    // Handle keyboard shortcuts
    document.addEventListener('keydown', (e) => {
      // Ctrl+K for command palette
      if (e.ctrlKey && e.key === 'k') {
        e.preventDefault();
        document.getElementById('aiInput').focus();
      }
      
      // Ctrl+Enter to send message
      if (e.ctrlKey && e.key === 'Enter') {
        sendAIRequest();
      }
    });
    
    // Handle AI input
    function sendAIRequest() {
      const input = document.getElementById('aiInput');
      const messages = document.getElementById('ai-messages');
      const text = input.value.trim();
      
      if (!text) return;
      
      // Add user message
      messages.innerHTML += `
        <div style="margin-bottom: 10px; font-size: 13px;">
          <strong>You:</strong> ${text}
        </div>
        <div style="margin-bottom: 10px; font-size: 13px; color: var(--text-secondary);">
          <em>Thinking...</em>
        </div>
      `;
      
      input.value = '';
      messages.scrollTop = messages.scrollHeight;
      
      // Simulate AI response (in real app, would call backend API)
      setTimeout(() => {
        messages.innerHTML += `
          <div style="margin-bottom: 10px; font-size: 13px;">
            <strong>AI:</strong> I'd be happy to help you with "${text}". 
            As an AI coding assistant, I can:
            <ul style="margin-top: 5px; padding-left: 20px;">
              <li>Write and edit code</li>
              <li>Run terminal commands</li>
              <li>Explain code functionality</li>
              <li>Refactor and optimize code</li>
            </ul>
          </div>
        `;
        messages.scrollTop = messages.scrollHeight;
      }, 1000);
    }
    
    // Listen for menu events
    window.electronAPI?.onAICommandPalette(() => {
      document.getElementById('aiInput').focus();
    });
    
    window.electronAPI?.onFileOpen((path) => {
      console.log('Opening file:', path);
    });
  </script>
</body>
</html>
